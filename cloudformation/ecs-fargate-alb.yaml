AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal ECS Fargate + ALB deployment for the RAG at Scale API.

Parameters:
  ProjectName:
    Type: String
    Default: rag-at-scale
    AllowedPattern: '[a-zA-Z0-9-]+'
    Description: Prefix used for ECS and ALB resources.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC used for the deployment.
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets used by the ALB and ECS service.
  ImageUri:
    Type: String
    Description: ECR image URI for the FastAPI service.
  ContainerPort:
    Type: Number
    Default: 8000
    Description: Application port exposed publicly.
  HealthCheckPath:
    Type: String
    Default: /health
    Description: Health endpoint exposed by the app.
  Cpu:
    Type: String
    Default: '2048'
    AllowedValues:
      - '256'
      - '512'
      - '1024'
      - '2048'
      - '4096'
      - '8192'
      - '16384'
    Description: Fargate CPU units.
  Memory:
    Type: String
    Default: '4096'
    Description: Fargate memory in MiB.
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of ECS tasks to keep running.
  LogRetentionInDays:
    Type: Number
    Default: 7
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: CloudWatch log retention for ECS application logs.

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CloudWatchLogsExtended
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}-service:*'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                Resource: '*'
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: '*'

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}-service'
      RetentionInDays: !Ref LogRetentionInDays

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ALB access for ${ProjectName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub 'ECS service access for ${ProjectName}'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: 200

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-task'
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub '${ProjectName}-service'
      Cluster: !Ref Cluster
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      HealthCheckGracePeriodSeconds: 300
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref PublicSubnetIds
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: app
          ContainerPort: !Ref ContainerPort
      TaskDefinition: !Ref TaskDefinition

  ObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${ProjectName}-observability'
      DashboardBody: !Sub
        - >
          {
            "widgets": [
              {
                "type": "text",
                "x": 0, "y": 0, "width": 24, "height": 2,
                "properties": {
                  "markdown": "# RAG at Scale — Observability Dashboard\nCluster: **${ProjectName}-cluster** | Service: **${ProjectName}-service** | Region: **${AWS::Region}**\n\n> _ECS Fargate + ALB metrics. Container Insights enabled. Logs stream to CloudWatch._"
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 2, "width": 8, "height": 6,
                "properties": {
                  "title": "ECS CPU Utilization (%)",
                  "view": "timeSeries",
                  "stat": "Average",
                  "period": 60,
                  "metrics": [
                    ["ECS/ContainerInsights", "CpuUtilized", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "CPU Used (vCPU)"}],
                    ["ECS/ContainerInsights", "CpuReserved", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "CPU Reserved (vCPU)", "color": "#aec7e8"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 8, "y": 2, "width": 8, "height": 6,
                "properties": {
                  "title": "ECS Memory Utilization (MB)",
                  "view": "timeSeries",
                  "stat": "Average",
                  "period": 60,
                  "metrics": [
                    ["ECS/ContainerInsights", "MemoryUtilized", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "Memory Used (MB)"}],
                    ["ECS/ContainerInsights", "MemoryReserved", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "Memory Reserved (MB)", "color": "#aec7e8"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 16, "y": 2, "width": 8, "height": 6,
                "properties": {
                  "title": "ECS Running Tasks",
                  "view": "timeSeries",
                  "stat": "Average",
                  "period": 60,
                  "metrics": [
                    ["ECS/ContainerInsights", "RunningTaskCount", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "Running Tasks", "color": "#2ca02c"}],
                    ["ECS/ContainerInsights", "DesiredTaskCount", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "Desired Tasks", "color": "#aec7e8"}],
                    ["ECS/ContainerInsights", "PendingTaskCount", "ClusterName", "${ProjectName}-cluster", "ServiceName", "${ProjectName}-service", {"label": "Pending Tasks", "color": "#ff7f0e"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 8, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — Request Count (per minute)",
                  "view": "timeSeries",
                  "stat": "Sum",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "RequestCount", "LoadBalancer", "${AlbId}", {"label": "Total Requests", "color": "#1f77b4"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 8, "y": 8, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — Target Response Time (ms)",
                  "view": "timeSeries",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${AlbId}", {"stat": "p50", "label": "p50 Latency"}],
                    ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${AlbId}", {"stat": "p95", "label": "p95 Latency", "color": "#ff7f0e"}],
                    ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${AlbId}", {"stat": "p99", "label": "p99 Latency", "color": "#d62728"}]
                  ],
                  "yAxis": {"left": {"min": 0}},
                  "annotations": {
                    "horizontal": [{"label": "2s SLA", "value": 2, "color": "#d62728"}]
                  }
                }
              },
              {
                "type": "metric",
                "x": 16, "y": 8, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — HTTP Error Rates",
                  "view": "timeSeries",
                  "stat": "Sum",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "HTTPCode_Target_4XX_Count", "LoadBalancer", "${AlbId}", {"label": "4xx Client Errors", "color": "#ff7f0e"}],
                    ["AWS/ApplicationELB", "HTTPCode_Target_5XX_Count", "LoadBalancer", "${AlbId}", {"label": "5xx Server Errors", "color": "#d62728"}],
                    ["AWS/ApplicationELB", "HTTPCode_ELB_5XX_Count",    "LoadBalancer", "${AlbId}", {"label": "5xx ALB Errors",    "color": "#9467bd"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 0, "y": 14, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — Healthy Targets",
                  "view": "timeSeries",
                  "stat": "Average",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "HealthyHostCount",   "TargetGroup", "${TgId}", "LoadBalancer", "${AlbId}", {"label": "Healthy", "color": "#2ca02c"}],
                    ["AWS/ApplicationELB", "UnHealthyHostCount", "TargetGroup", "${TgId}", "LoadBalancer", "${AlbId}", {"label": "Unhealthy", "color": "#d62728"}]
                  ],
                  "yAxis": {"left": {"min": 0, "max": 5}}
                }
              },
              {
                "type": "metric",
                "x": 8, "y": 14, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — Active Connections",
                  "view": "timeSeries",
                  "stat": "Sum",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "ActiveConnectionCount", "LoadBalancer", "${AlbId}", {"label": "Active Connections", "color": "#17becf"}],
                    ["AWS/ApplicationELB", "NewConnectionCount",    "LoadBalancer", "${AlbId}", {"label": "New Connections",    "color": "#bcbd22"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "metric",
                "x": 16, "y": 14, "width": 8, "height": 6,
                "properties": {
                  "title": "ALB — Processed Bytes",
                  "view": "timeSeries",
                  "stat": "Sum",
                  "period": 60,
                  "metrics": [
                    ["AWS/ApplicationELB", "ProcessedBytes", "LoadBalancer", "${AlbId}", {"label": "Bytes Processed", "color": "#8c564b"}]
                  ],
                  "yAxis": {"left": {"min": 0}}
                }
              },
              {
                "type": "log",
                "x": 0, "y": 20, "width": 24, "height": 8,
                "properties": {
                  "title": "Application Logs — Live Stream (/ecs/${ProjectName}-service)",
                  "query": "SOURCE '/ecs/${ProjectName}-service' | fields @timestamp, @message | sort @timestamp desc | limit 50",
                  "region": "${AWS::Region}",
                  "view": "table"
                }
              }
            ]
          }
        - AlbId: !Select [1, !Split ["loadbalancer/", !GetAtt LoadBalancer.LoadBalancerArn]]
          TgId:  !Select [1, !Split ["targetgroup/",  !GetAtt TargetGroup.TargetGroupArn]]

Outputs:
  ClusterName:
    Description: ECS cluster name.
    Value: !Ref Cluster
  ServiceName:
    Description: ECS service name.
    Value: !Sub '${ProjectName}-service'
  TaskDefinitionArn:
    Description: Active ECS task definition ARN.
    Value: !Ref TaskDefinition
  LogGroupName:
    Description: CloudWatch log group for the service.
    Value: !Ref LogGroup
  LoadBalancerDnsName:
    Description: ALB DNS name.
    Value: !GetAtt LoadBalancer.DNSName
  LoadBalancerUrl:
    Description: Public service URL.
    Value: !Sub 'http://${LoadBalancer.DNSName}'
  DashboardUrl:
    Description: CloudWatch Observability Dashboard URL.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-observability'
